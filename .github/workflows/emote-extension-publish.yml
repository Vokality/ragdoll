name: Publish Emote Extension

on:
  push:
    tags:
      - "emote-v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/emote

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Build ragdoll package
        working-directory: packages/ragdoll
        run: bun run build

      - name: Package extension
        run: bun run package

      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: apps/emote/emote.vsix
          registryUrl: https://open-vsx.org
          skipDuplicate: true
